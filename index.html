<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IELTS Platform - Welcome</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .welcome-container {
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 550px;
            text-align: center;
        }

        .logo {
            margin-bottom: 30px;
        }

        .logo h1 {
            color: #667eea;
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .logo p {
            color: #666;
            font-size: 1.2rem;
        }

        .welcome-text {
            margin: 30px 0;
            color: #333;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .buttons {
            display: flex;
            gap: 20px;
            margin-top: 40px;
        }

        .btn {
            flex: 1;
            padding: 18px 30px;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: block;
        }

        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-register {
            background: white;
            color: #667eea;
            border: 3px solid #667eea;
        }

        .btn-register:hover {
            background: #667eea;
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
        }

        .features {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 2px solid #f0f0f0;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 15px 0;
            text-align: left;
            color: #666;
        }

        .feature-icon {
            font-size: 1.8rem;
        }

        @media (max-width: 600px) {
            .buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <div class="welcome-container">
        <div class="logo">
            <h1>📚 IELTS Platform</h1>
            <p>8-Week Intensive Program</p>
        </div>

        <div class="welcome-text">
            Welcome to your comprehensive IELTS preparation platform. Track your progress, complete daily tasks, and achieve your target score.
        </div>

        <div class="buttons">
            <a href="login.html" class="btn btn-login">Login</a>
            <a href="register.html" class="btn btn-register">Register</a>
        </div>

        <div class="features">
            <div class="feature-item">
                <div class="feature-icon">✅</div>
                <div>Structured 8-week curriculum</div>
            </div>
            <div class="feature-item">
                <div class="feature-icon">📊</div>
                <div>Track your progress in real-time</div>
            </div>
            <div class="feature-item">
                <div class="feature-icon">🎯</div>
                <div>Personalized learning dashboard</div>
            </div>
        </div>
    </div>

</body>
</html>
