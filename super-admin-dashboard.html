<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin Dashboard - IELTS Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f6fa;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 2rem;
            margin-bottom: 5px;
        }

        .header p {
            opacity: 0.9;
        }

        .logout-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .logout-btn:hover {
            background: white;
            color: #667eea;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .stat-card h3 {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .stat-card .value {
            font-size: 2.5rem;
            font-weight: bold;
            color: #667eea;
        }

        .stat-card .subtext {
            color: #999;
            font-size: 0.85rem;
            margin-top: 5px;
        }

        .students-section {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 30px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 1.5rem;
            color: #333;
        }

        .filter-group {
            display: flex;
            gap: 10px;
        }

        .filter-btn {
            padding: 8px 16px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .students-table {
            width: 100%;
            border-collapse: collapse;
        }

        .students-table thead {
            background: #f8f9fa;
        }

        .students-table th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #666;
            border-bottom: 2px solid #dee2e6;
        }

        .students-table td {
            padding: 15px;
            border-bottom: 1px solid #dee2e6;
        }

        .students-table tbody tr {
            cursor: pointer;
            transition: background 0.2s;
        }

        .students-table tbody tr:hover {
            background: #f8f9fa;
        }

        .progress-cell {
            width: 200px;
        }

        .mini-progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
        }

        .mini-progress-fill {
            height: 100%;
            transition: width 0.3s;
        }

        .mini-progress-fill.red {
            background: #dc3545;
        }

        .mini-progress-fill.yellow {
            background: #ffc107;
        }

        .mini-progress-fill.green {
            background: #28a745;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }

        .status-dot.red {
            background: #dc3545;
        }

        .status-dot.yellow {
            background: #ffc107;
        }

        .status-dot.green {
            background: #28a745;
        }

        /* Modal styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            overflow-y: auto;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            max-width: 900px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            padding: 25px;
            border-bottom: 1px solid #dee2e6;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            color: #333;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #999;
        }

        .close-btn:hover {
            color: #333;
        }

        .modal-body {
            padding: 25px;
        }

        .task-list {
            margin-top: 20px;
        }

        .task-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .task-info {
            flex: 1;
        }

        .task-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .task-status {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .task-status-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .task-status-badge.completed {
            background: #d4edda;
            color: #155724;
        }

        .task-status-badge.in-progress {
            background: #fff3cd;
            color: #856404;
        }

        .task-status-badge.not-started {
            background: #f8d7da;
            color: #721c24;
        }

        .task-time {
            color: #667eea;
            font-weight: 600;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div>
                <h1>👑 Super Admin Dashboard</h1>
                <p><span id="teacherName">Loading...</span> | All Groups</p>
            </div>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="container">
        <!-- Statistics -->
        <div class="stats-grid">
            <div class="stat-card">
                <h3>TOTAL STUDENTS</h3>
                <div class="value" id="totalStudents">-</div>
                <div class="subtext">in your group</div>
            </div>
            <div class="stat-card">
                <h3>WEEK 1 COMPLETION</h3>
                <div class="value"><span id="completedStudents">-</span>/<span id="totalStudents2">-</span></div>
                <div class="subtext">students completed</div>
            </div>
            <div class="stat-card">
                <h3>AVERAGE PROGRESS</h3>
                <div class="value" id="avgProgress">-%</div>
                <div class="subtext">across all students</div>
            </div>
            <div class="stat-card">
                <h3>AVERAGE TIME</h3>
                <div class="value" id="avgTime">- min</div>
                <div class="subtext">per day completed</div>
            </div>
        </div>

        <!-- Students Table -->
        <div class="students-section">
            <div class="section-header">
                <h2 class="section-title">📊 Student Progress</h2>
                <div class="filter-group">
                    <button class="filter-btn active" onclick="filterStudents('all')">All</button>
                    <button class="filter-btn" onclick="filterStudents('completed')">Completed</button>
                    <button class="filter-btn" onclick="filterStudents('in-progress')">In Progress</button>
                    <button class="filter-btn" onclick="filterStudents('not-started')">Not Started</button>
                </div>
            </div>

            <div id="studentsTableContainer">
                <div class="loading">Loading students...</div>
            </div>
        </div>
    </div>

    <!-- Student Detail Modal -->
    <div class="modal" id="studentModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalStudentName">Student Details</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
                <div class="loading">Loading details...</div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        // Initialize Supabase - FIXED!
        const SUPABASE_URL = 'https://nbfceuhuauizyucugejr.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_0mFIGJkA_DKZfUiDAWFdrA_nXt0hF6H';
        const { createClient } = supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentTeacher = null;
        let allStudents = [];
        let currentFilter = 'all';

        window.addEventListener('load', async () => {
            const userStr = localStorage.getItem('user');
            if (!userStr) {
                window.location.href = 'login.html';
                return;
            }

            currentTeacher = JSON.parse(userStr);
            
            if (currentTeacher.type !== 'teacher' || !currentTeacher.isSuperAdmin) {
                window.location.href = 'login.html';
                return;
            }

            document.getElementById('teacherName').textContent = currentTeacher.name;

            await loadDashboardData();
        });

        async function loadDashboardData() {
            try {
                // Get ALL students from ALL groups (super admin)
                const { data: students, error } = await supabaseClient
                    .from('students')
                    .select(`
                        *,
                        day_summary (
                            week,
                            day,
                            completed_tasks,
                            total_tasks,
                            percentage,
                            total_time_spent_minutes
                        )
                    `)
                    .order('student_group')
                    .order('name');

                if (error) throw error;

                allStudents = students || [];

                // Calculate statistics
                updateStatistics();
                renderStudentsTable();

            } catch (error) {
                console.error('Error loading dashboard:', error);
            }
        }

        function updateStatistics() {
            const total = allStudents.length;
            document.getElementById('totalStudents').textContent = total;
            document.getElementById('totalStudents2').textContent = total;

            if (total === 0) {
                document.getElementById('completedStudents').textContent = '0';
                document.getElementById('avgProgress').textContent = '0%';
                document.getElementById('avgTime').textContent = '0 min';
                return;
            }

            // Calculate completed students (100% on all days)
            const completed = allStudents.filter(s => {
                if (!s.day_summary || s.day_summary.length === 0) return false;
                // Check if all 5 days are 100%
                const completedDays = s.day_summary.filter(d => d.percentage === 100).length;
                return completedDays === 5;
            }).length;

            document.getElementById('completedStudents').textContent = completed;

            // Average progress
            let totalProgress = 0;
            let totalTime = 0;
            let daysCount = 0;

            allStudents.forEach(student => {
                if (student.day_summary) {
                    student.day_summary.forEach(day => {
                        totalProgress += day.percentage || 0;
                        totalTime += day.total_time_spent_minutes || 0;
                        daysCount++;
                    });
                }
            });

            const avgProgress = daysCount > 0 ? Math.round(totalProgress / daysCount) : 0;
            const avgTime = daysCount > 0 ? Math.round(totalTime / daysCount) : 0;

            document.getElementById('avgProgress').textContent = avgProgress + '%';
            document.getElementById('avgTime').textContent = avgTime + ' min';
        }

        function renderStudentsTable() {
            const container = document.getElementById('studentsTableContainer');

            if (allStudents.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <h3>No students yet</h3>
                        <p>Students will appear here once they register</p>
                    </div>
                `;
                return;
            }

            // Filter students
            let filteredStudents = allStudents;
            if (currentFilter !== 'all') {
                filteredStudents = allStudents.filter(student => {
                    const status = getStudentStatus(student);
                    return status === currentFilter;
                });
            }

            let tableHTML = `
                <table class="students-table">
                    <thead>
                        <tr>
                            <th>Student Name</th>
                            <th>Group</th>
                            <th>Week 1 Progress</th>
                            <th>Status</th>
                            <th>Last Active</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            filteredStudents.forEach(student => {
                const progress = calculateWeekProgress(student);
                const status = getStudentStatus(student);
                const lastLogin = student.last_login ? new Date(student.last_login).toLocaleDateString() : 'Never';

                let statusColor = 'red';
                if (progress >= 80) statusColor = 'green';
                else if (progress >= 30) statusColor = 'yellow';

                let statusText = 'Not Started';
                if (progress === 100) statusText = 'Completed';
                else if (progress > 0) statusText = 'In Progress';

                tableHTML += `
                    <tr onclick="showStudentDetails('${student.id}')">
                        <td><strong>${student.name}</strong></td>
                        <td><span style="background: #e7f3ff; padding: 4px 12px; border-radius: 12px; font-size: 0.85rem; color: #667eea;">${student.student_group}</span></td>
                        <td class="progress-cell">
                            <div style="display: flex; align-items: center; gap: 10px;">
                                <div class="mini-progress-bar" style="flex: 1;">
                                    <div class="mini-progress-fill ${statusColor}" style="width: ${progress}%"></div>
                                </div>
                                <span style="font-size: 0.85rem; color: #666;">${progress}%</span>
                            </div>
                        </td>
                        <td>
                            <span class="status-dot ${statusColor}"></span>
                            ${statusText}
                        </td>
                        <td style="color: #999;">${lastLogin}</td>
                    </tr>
                `;
            });

            tableHTML += `
                    </tbody>
                </table>
            `;

            container.innerHTML = tableHTML;
        }

        function calculateWeekProgress(student) {
            if (!student.day_summary || student.day_summary.length === 0) return 0;
            
            const totalDays = 5;
            const completedDays = student.day_summary.filter(d => d.percentage === 100).length;
            return Math.round((completedDays / totalDays) * 100);
        }

        function getStudentStatus(student) {
            const progress = calculateWeekProgress(student);
            if (progress === 100) return 'completed';
            if (progress > 0) return 'in-progress';
            return 'not-started';
        }

        function filterStudents(filter) {
            currentFilter = filter;
            
            // Update active button
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            renderStudentsTable();
        }

        async function showStudentDetails(studentId) {
            const modal = document.getElementById('studentModal');
            const modalBody = document.getElementById('modalBody');
            modal.classList.add('active');

            modalBody.innerHTML = '<div class="loading">Loading details...</div>';

            try {
                const student = allStudents.find(s => s.id === studentId);
                if (!student) return;

                document.getElementById('modalStudentName').textContent = student.name;

                // Get detailed task progress
                const { data: taskProgress, error } = await supabaseClient
                    .from('task_progress')
                    .select('*')
                    .eq('student_id', studentId)
                    .eq('week', 1)
                    .order('day')
                    .order('task_number');

                if (error) throw error;

                // Render detailed view
                let detailsHTML = '';

                for (let day = 1; day <= 5; day++) {
                    const dayTasks = taskProgress.filter(t => t.day === day);
                    const daySummary = student.day_summary?.find(d => d.day === day);
                    
                    const percentage = daySummary?.percentage || 0;
                    const totalTime = daySummary?.total_time_spent_minutes || 0;

                    detailsHTML += `
                        <div style="margin-bottom: 30px;">
                            <h3 style="color: #667eea; margin-bottom: 15px;">📅 Day ${day}</h3>
                            <div style="display: flex; gap: 20px; margin-bottom: 15px;">
                                <div style="flex: 1; background: #f8f9fa; padding: 15px; border-radius: 8px;">
                                    <div style="color: #666; font-size: 0.9rem;">Progress</div>
                                    <div style="font-size: 1.5rem; font-weight: bold; color: #667eea;">${percentage}%</div>
                                </div>
                                <div style="flex: 1; background: #f8f9fa; padding: 15px; border-radius: 8px;">
                                    <div style="color: #666; font-size: 0.9rem;">Time Spent</div>
                                    <div style="font-size: 1.5rem; font-weight: bold; color: #667eea;">${totalTime} min</div>
                                </div>
                            </div>
                            <div class="task-list">
                    `;

                    for (let taskNum = 1; taskNum <= 7; taskNum++) {
                        const task = dayTasks.find(t => t.task_number === taskNum);
                        const status = task?.status || 'not_started';
                        const timeSpent = task?.time_spent_seconds ? Math.round(task.time_spent_seconds / 60) : 0;

                        let statusBadge = '';
                        if (status === 'completed') statusBadge = '<span class="task-status-badge completed">✅ Completed</span>';
                        else if (status === 'in_progress') statusBadge = '<span class="task-status-badge in-progress">⏳ In Progress</span>';
                        else statusBadge = '<span class="task-status-badge not-started">⏹️ Not Started</span>';

                        detailsHTML += `
                            <div class="task-item">
                                <div class="task-info">
                                    <div class="task-name">Task ${taskNum}</div>
                                </div>
                                <div class="task-status">
                                    ${statusBadge}
                                    <div class="task-time">${timeSpent > 0 ? timeSpent + ' min' : '-'}</div>
                                </div>
                            </div>
                        `;
                    }

                    detailsHTML += `
                            </div>
                        </div>
                    `;
                }

                modalBody.innerHTML = detailsHTML;

            } catch (error) {
                console.error('Error loading student details:', error);
                modalBody.innerHTML = '<div style="color: #dc3545; text-align: center; padding: 40px;">Error loading details</div>';
            }
        }

        function closeModal() {
            document.getElementById('studentModal').classList.remove('active');
        }

        // Close modal on outside click
        document.getElementById('studentModal').addEventListener('click', (e) => {
            if (e.target.id === 'studentModal') {
                closeModal();
            }
        });

        function logout() {
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
