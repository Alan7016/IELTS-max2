<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration - IELTS Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .register-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            color: #667eea;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .logo p {
            color: #666;
            font-size: 1rem;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .password-hint {
            font-size: 0.85rem;
            color: #666;
            margin-top: 5px;
        }

        .btn-register {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-register:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }

        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
        }

        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="logo">
            <h1>📚 IELTS Platform</h1>
            <p>Register Your Account</p>
        </div>

        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>
        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <p>Creating your account...</p>
        </div>

        <form id="registerForm">
            <div class="form-group">
                <label for="fullName">Full Name *</label>
                <input type="text" id="fullName" name="fullName" required placeholder="Enter your full name">
            </div>

            <div class="form-group">
                <label for="username">Username *</label>
                <input type="text" id="username" name="username" required placeholder="Choose a username" pattern="[a-zA-Z0-9_]{3,20}" title="Username must be 3-20 characters (letters, numbers, underscore only)">
                <div class="password-hint">3-20 characters, letters and numbers only</div>
            </div>

            <div class="form-group">
                <label for="password">Password *</label>
                <input type="password" id="password" name="password" required placeholder="Choose a strong password" minlength="6">
                <div class="password-hint">Minimum 6 characters</div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password *</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Re-enter your password">
            </div>

            <div class="form-group">
                <label for="group">Select Your Group *</label>
                <select id="group" name="group" required>
                    <option value="">-- Choose your group --</option>
                    <optgroup label="Standard">
                        <option value="Standard 1">Standard 1</option>
                        <option value="Standard 2">Standard 2</option>
                        <option value="Standard 3">Standard 3</option>
                        <option value="Standard 4">Standard 4</option>
                        <option value="Standard 5">Standard 5</option>
                    </optgroup>
                    <optgroup label="Advanced">
                        <option value="Advanced 1">Advanced 1</option>
                        <option value="Advanced 2">Advanced 2</option>
                        <option value="Advanced 3">Advanced 3</option>
                        <option value="Advanced 4">Advanced 4</option>
                        <option value="Advanced 5">Advanced 5</option>
                    </optgroup>
                    <optgroup label="Expert">
                        <option value="Expert 1">Expert 1</option>
                        <option value="Expert 2">Expert 2</option>
                        <option value="Expert 3">Expert 3</option>
                    </optgroup>
                </select>
            </div>

            <button type="submit" class="btn-register" id="submitBtn">Register</button>
        </form>

        <div class="login-link">
            Already have an account? <a href="login.html">Login here</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Initialize Supabase (YOU NEED TO REPLACE THESE WITH YOUR ACTUAL VALUES)
        const SUPABASE_URL = 'https://nbfceuhuaizyucugejr.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_0mfIG3kA_DKZfU1DAWFdrA_nxtoh...FULL_KEY_HERE';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const form = document.getElementById('registerForm');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const loading = document.getElementById('loading');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Get form values
            const fullName = document.getElementById('fullName').value.trim();
            const username = document.getElementById('username').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const group = document.getElementById('group').value;

            // Hide messages
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';

            // Validation
            if (!fullName || !username || !password || !group) {
                showError('Please fill in all fields');
                return;
            }

            if (password !== confirmPassword) {
                showError('Passwords do not match');
                return;
            }

            if (password.length < 6) {
                showError('Password must be at least 6 characters');
                return;
            }

            // Show loading
            loading.style.display = 'block';
            submitBtn.disabled = true;

            try {
                // Check if username already exists
                const { data: existingUser } = await supabase
                    .from('students')
                    .select('username')
                    .eq('username', username)
                    .single();

                if (existingUser) {
                    showError('Username already taken. Please choose another one.');
                    loading.style.display = 'none';
                    submitBtn.disabled = false;
                    return;
                }

                // Hash password (using simple base64 for demo - in production use bcrypt)
                const passwordHash = btoa(password);

                // Insert student
                const { data, error } = await supabase
                    .from('students')
                    .insert([
                        {
                            name: fullName,
                            username: username,
                            password_hash: passwordHash,
                            student_group: group
                        }
                    ])
                    .select();

                if (error) {
                    throw error;
                }

                // Success!
                showSuccess('Registration successful! Redirecting to login...');
                form.reset();
                
                // Redirect to login after 2 seconds
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);

            } catch (error) {
                console.error('Registration error:', error);
                showError('Registration failed: ' + error.message);
                submitBtn.disabled = false;
            } finally {
                loading.style.display = 'none';
            }
        });

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
            window.scrollTo(0, 0);
        }

        function showSuccess(message) {
            successMessage.textContent = message;
            successMessage.style.display = 'block';
            window.scrollTo(0, 0);
        }

        // Real-time username validation
        document.getElementById('username').addEventListener('input', (e) => {
            e.target.value = e.target.value.toLowerCase().replace(/[^a-z0-9_]/g, '');
        });

        // Password match validation
        document.getElementById('confirmPassword').addEventListener('input', (e) => {
            const password = document.getElementById('password').value;
            const confirmPassword = e.target.value;
            
            if (confirmPassword && password !== confirmPassword) {
                e.target.setCustomValidity('Passwords do not match');
            } else {
                e.target.setCustomValidity('');
            }
        });
    </script>
</body>
</html>
